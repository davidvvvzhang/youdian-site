<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>有店 - 技术支持</title>
  <meta name="description" content="有店技术支持页面，包含常见问题、联系方式、隐私与协议链接。" />
  <style>
    :root {
      --bg: #f7f4ef;
      --card: #fff;
      --text: #1f1f1f;
      --sub: #606060;
      --line: #e7dfd6;
      --brand: #3f6f55;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      line-height: 1.65;
    }
    .wrap { max-width: 840px; margin: 0 auto; padding: 24px 18px 48px; }
    .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 18px;
      margin-bottom: 12px;
    }
    h1 { margin: 0 0 4px; font-size: 30px; }
    h2 { margin: 0 0 8px; font-size: 18px; }
    p { margin: 0; color: var(--sub); font-size: 14px; }
    ul { margin: 0; padding-left: 18px; color: var(--sub); font-size: 14px; }
    a { color: var(--brand); text-decoration: none; }
    .home { margin-bottom: 12px; display: inline-block; font-size: 14px; }
  </style>
</head>
<body>
  <main class="wrap">
    <a class="home" href="../">返回首页</a>

    <section class="panel">
      <h1>有店技术支持</h1>
      <p>如果你在使用过程中遇到问题，欢迎通过以下方式联系我们。</p>
    </section>

    <section class="panel">
      <h2>联系我们</h2>
      <ul>
        <li>邮箱：<a href="mailto:2801442102@qq.com">2801442102@qq.com</a></li>
        <li>App 内路径：我的 → 意见反馈</li>
      </ul>
    </section>

    <section class="panel">
      <h2>常见问题</h2>
      <ul>
        <li>定位异常：请在系统设置中为“有店”开启定位权限，并确保网络可用。</li>
        <li>评论/收藏不同步：请确认已登录账号后重试。</li>
        <li>功能建议：欢迎通过意见反馈提交，我们会持续改进。</li>
      </ul>
    </section>

    <section class="panel">
      <h2>法律与隐私</h2>
      <ul>
        <li><a href="../privacy/">隐私政策</a></li>
      </ul>
      <p style="margin-top:8px;">© 2026 有店（Youdian）. All Rights Reserved.</p>
    </section>
  </main>
</body>
</html>
